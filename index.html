<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニオのHP</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ようこそ！</h1>

    <p>nio3232のwebへ！</p>

    <p>私はhtml、css、htmlを使用して</p>
    <p>ゲームやサイトをプログラミングしています</p>

    <button id="btn">押してみる</button>

    <p id="result">Pyodideを読み込み中...</p>

    <!-- Pyodideを先に読み込む -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>

    <!-- あなたのJavaScript -->
    <script src="script.js"></script>

    <!-- Pyodideのテスト -->
    <script>
        async function main() {
            // Pyodideを読み込む
            let pyodide = await loadPyodide();

            // Pythonを実行
            let res = pyodide.runPython(`
text = "こんにちは！"
number = 100 * 5
f"{text} 計算結果は {number} です。"
`);

            // HTMLへ表示
            document.getElementById("result").innerText = res;
        }

        main();
    </script>

</body>
</html>
